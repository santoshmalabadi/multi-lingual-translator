<!DOCTYPE html>
<html lang="en">
<head>

<meta charset="UTF-8">
<title>AI Translator</title>

<script src="https://cdn.tailwindcss.com"></script>

</head>
<body class="bg-gradient-to-r from-indigo-500 via-purple-500 to-pink-500 min-h-screen flex justify-center py-10"></body>

<div class="bg-white shadow-2xl rounded-2xl p-8 w-96">

<h1 class="text-2xl font-bold text-center text-gray-700 mb-6">
🌍 AI Language Translator
</h1>

<form method="POST">

<textarea name="text"
rows="5"
placeholder="Enter text here..."
class="w-full p-3 border rounded-lg focus:outline-none focus:ring-2 focus:ring-indigo-400">
</textarea>

<br><br>

<select name="language"
class="w-full p-3 border rounded-lg focus:outline-none focus:ring-2 focus:ring-indigo-400">

<option value="hi">Hindi</option>
<option value="kn">Kannada</option>
<option value="ta">Tamil</option>
<option value="te">Telugu</option>
<option value="mr">Marathi</option>
<option value="fr">French</option>
<option value="es">Spanish</option>

</select>

<br><br>

<button type="submit"
class="w-full bg-indigo-600 text-white py-3 rounded-lg hover:bg-indigo-700 transition duration-300">

Translate

</button>

</form>

<div class="mt-6 bg-gray-100 p-4 rounded-lg">

<h3 class="font-semibold text-gray-600">Translated Text</h3>

<p class="text-gray-700">{{ translation }}</p>

</div>

</div>

</body>
</html>
